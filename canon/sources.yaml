# canon/sources.yaml — single source of truth for the canon manifest.
#
# This file is the ONE registry for every work the canon-librarian may surface.
# bin/ingest-canon.mjs reads this file directly (no separate ingest queue).
# bin/check-canon-schema.sh validates the schema (deferred; not yet shipped).
#
# Full field documentation lives in canon/README.md. This header is a
# quick-reference; canon/README.md is authoritative.
#
# REQUIRED FIELDS (every entry):
#   slug            kebab-case identifier; matches canon/corpus/<slug>/ if any
#   author          string (primary author or org)
#   title           string (work title)
#   year            4-digit integer (publication year)
#   category        kebab-case grouping tag (for display only; does not affect retrieval)
#   kind            enum: book | paper | essay | talk | standard | docs
#   topics          list of kebab-case strings; min 1; used by canon-librarian for retrieval
#   source_url      https URL (canonical location)
#   license         enum (see canon/README.md §License values)
#   lifecycle       enum: snapshot-only | snapshot+refresh | live-only
#   volatility      enum: durable | slow | fast | volatile
#   last_verified   ISO 8601 date (YYYY-MM-DD); when the curator last checked this entry
#   fetch_mode      enum: html | html-multi | arxiv-abs | aws-docs | pdf-manual | owned-book | none
#                   (use `none` ONLY when lifecycle is `live-only`)
#
# OPTIONAL FIELDS:
#   notes           multi-line string; the only free-form field; provenance / caveats / edition notes
#
# DERIVED (not stored; computed at read time):
#   next_review_by = last_verified + cadence(volatility)
#     where cadence(durable) = ∞   (no review timer)
#           cadence(slow)    = 365 days
#           cadence(fast)    = 90 days
#           cadence(volatile)= 30 days
#
# DO NOT add fields not documented in canon/README.md. Schema bloat is the named
# failure mode of unified registries (Confluent/Solace schema-registry literature).
# Add a field only via a rationale entry in upgrades/ and an explicit doc update.

schema_version: 2

